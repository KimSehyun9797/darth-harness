name: ci
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: shellcheck
        run: |
          shellcheck --severity=warning -x install.sh scripts/*.sh tests/run-tests.sh \
            template/.harness/lib/state.sh template/.harness/bin/*
  test:
    # cmux 기반 하네스의 지원 플랫폼은 macOS다. Linux 전체 테스트 호환은
    # 별도 백로그 항목으로 복구한다 (2026-07-17, live-status·verify 계열 8건).
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: brew install yq
      - name: tests
        run: bash tests/run-tests.sh
