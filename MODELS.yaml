# MODELS.yaml — 논리 역할 → 실제 CLI 매핑. 실제 모델명은 이 파일에만 존재한다.
# 후보는 순서대로 시도한다. 설치된 후보가 없으면 스크립트는 BLOCKED로 멈춘다 (결정 15).
roles:
  orchestrator:
    effort: high
    candidates:
      - name: claude-fable
        command: claude
        args: ["--model=fable", "--effort=high"]
  # 비대화형 워커는 승인 프롬프트에 답할 주체가 없어 기본 권한으로는 쓰기가
  # 전부 거부된다(2026-07-13 실측). 파일 편집 자동 승인 + 테스트용 bash/sh만
  # 허용한다. 전면 권한 우회(--dangerously-skip-permissions)는 결정 20 위반.
  economy_worker:
    effort: low
    candidates:
      - name: codex-luna
        command: codex
        # workspace-write: 기본 read-only 샌드박스는 .done 원자 게시가 불가능
        # (2026-07-14 실측). 프로젝트 안 쓰기만 허용 — 전면 우회 아님 (결정 20).
        args: ["exec", "--model", "gpt-5.6-luna", "--config",
               "model_reasoning_effort=\"low\"", "--sandbox", "workspace-write"]
      - name: claude-haiku
        command: claude
        args: ["-p", "--model=haiku", "--effort=low", "--permission-mode=acceptEdits",
               "--allowedTools=Bash(bash:*),Bash(sh:*),Bash(mkdir:*),Bash(mv:*)"]
  standard_worker:
    effort: medium
    candidates:
      - name: codex-terra
        command: codex
        args: ["exec", "--model", "gpt-5.6-terra", "--config",
               "model_reasoning_effort=\"medium\"", "--sandbox", "workspace-write"]
      - name: claude-sonnet
        command: claude
        args: ["-p", "--model=sonnet", "--effort=medium", "--permission-mode=acceptEdits",
               "--allowedTools=Bash(bash:*),Bash(sh:*),Bash(mkdir:*),Bash(mv:*)"]
  frontier_worker:
    effort: high
    candidates:
      - name: codex-sol
        command: codex
        args: ["exec", "--model", "gpt-5.6-sol", "--config",
               "model_reasoning_effort=\"high\"", "--sandbox", "workspace-write"]
      - name: claude-fable
        command: claude
        args: ["-p", "--model=fable", "--fallback-model=opus", "--effort=high",
               "--permission-mode=acceptEdits",
               "--allowedTools=Bash(bash:*),Bash(sh:*),Bash(mkdir:*),Bash(mv:*)"]
  judge:                            # 워커와 다른 계열 우선 (자기 평가 회피)
    effort: high
    candidates:
      - name: claude-fable
        command: claude
        args: ["-p", "--model=fable", "--effort=high"]
      - name: codex-sol
        command: codex
        args: ["exec", "--model", "gpt-5.6-sol", "--config",
               "model_reasoning_effort=\"high\"", "--sandbox", "workspace-write"]
