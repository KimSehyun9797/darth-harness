# tasks.yaml — 작업 의존성 DAG. 오케스트레이터만 수정한다 (결정 34).
# status: pending|running|done|verified|failed|blocked|hold|skipped
contract_version: 3
context_contract_version: 1
execution_policy:
  default_workers: 1
  max_concurrent_workers: 3
  max_delegation_depth: 0
tasks: []
